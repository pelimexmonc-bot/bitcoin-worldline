<script>

let chart

async function loadData(){

  const res = await fetch("data/bitcoin.csv")
  const text = await res.text()

  const rows = text.trim().split("\n").slice(1)

  const labels=[]
  const prices=[]

  rows.forEach(r=>{
    const cols=r.split(",")

    const date=cols[0]
    const price=parseFloat(cols[1])

    if(!isNaN(price)){
      labels.push(date)
      prices.push(price)
    }
  })

  const ctx=document.getElementById("btcChart").getContext("2d")

  chart=new Chart(ctx,{
    type:"line",
    data:{
      labels:labels,
      datasets:[{
        label:"BTC Price",
        data:prices,
        borderColor:"orange",
        borderWidth:2,
        pointRadius:0
      }]
    },

    options:{
      responsive:true,
      maintainAspectRatio:false,

      scales:{
        x:{
          ticks:{ maxTicksLimit:10 }
        },
        y:{
          beginAtZero:false
        }
      },

      plugins:{
        zoom:{
          pan:{
            enabled:true,
            mode:"x"
          },

          zoom:{
            wheel:{ enabled:true },
            pinch:{ enabled:true },
            mode:"x"
          }
        }
      }
    },

    plugins:[{
      id:"autoScaleY",
      afterUpdate(chart){

        const xScale = chart.scales.x
        const yScale = chart.scales.y

        const data = chart.data.datasets[0].data

        let min=Infinity
        let max=-Infinity

        for(let i=xScale.min;i<=xScale.max;i++){

          const v=data[i]

          if(v<min) min=v
          if(v>max) max=v
        }

        if(min!==Infinity && max!==-Infinity){

          const padding=(max-min)*0.1

          yScale.options.min=min-padding
          yScale.options.max=max+padding
        }

      }
    }]
  })

}

loadData()

</script>
