<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bitcoin Worldline</title>
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>Bitcoin Worldline</h1>

<div class="info">

<div>
Date : <span id="date"></span>
</div>

<div>
BTC Price : $<span id="price"></span>
</div>

<div>
Cash : $<span id="cash"></span>
</div>

<div>
BTC : <span id="btc"></span>
</div>

<div>
Total Asset : $<span id="asset"></span>
</div>

</div>


<canvas id="chart"></canvas>

<div class="controls">

<button id="play">Play</button>
<button id="pause">Pause</button>

<button id="buy">BUY</button>
<button id="sell">SELL</button>

Speed
<select id="speed">
<option value="1">1x</option>
<option value="5">5x</option>
<option value="20">20x</option>
</select>

</div>


<div class="slider">

表示期間

<input type="range" id="rangeSlider"
min="30"
max="1500"
value="200">

<span id="rangeLabel">200</span> days

</div>


<script src="app.js"></script>

</body>
</html>
