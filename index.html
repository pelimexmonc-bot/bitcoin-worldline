<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bitcoin Worldline</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h1>Bitcoin Worldline</h1>
<h3>v0.2</h3>

<div class="info">
<div>Date : <span id="date"></span></div>
<div>BTC : $<span id="price"></span></div>
</div>

<div class="controls">
<button onclick="play()">▶ PLAY</button>
<button onclick="pause()">⏸ PAUSE</button>
</div>

<div class="trade">
<button onclick="buy()">BUY</button>
<button onclick="sell()">SELL</button>
</div>

<div class="jump">
<input type="date" id="jumpDate">
<button onclick="jumpToDate()">GO</button>
</div>

<div class="start">
<button onclick="randomStart()">Random Start</button>
</div>

<div class="portfolio">
<div>Cash : $<span id="cash"></span></div>
<div>BTC : <span id="btc"></span></div>
<div>Total : $<span id="total"></span></div>
</div>


<!-- 追加：表示範囲スライダー -->

<div class="range">
表示期間 :
<input type="range" id="rangeSlider" min="30" max="2000" value="120" step="10">
<span id="rangeValue">120</span> days
</div>


<div class="chart-container">
<canvas id="chart"></canvas>
</div>


<script src="js/chart.js"></script>
<script src="js/trade.js"></script>
<script src="js/engine.js"></script>
<script src="js/app.js"></script>

</body>
</html>
